<!DOCTYPE html>
<html lang="en">
<html>
    <head>
        <meta charset = "UTF-8">
        <meta name = "viewport" content = "width=device-width, initial scale=1.0">

        <title>Admin Page</title>
        <link rel ="stylesheet" href="../css/style.css">
        <link rel="stylesheet" href="../components/ToggleTheme/toggleStyle.css">
    </head>

    <body>
        <header class="dashboard-header">
            <div class = "container flex-between" style="align-items: center;">
                <div>
                <h1>Admin Dashboard</h1>
                <p class="text-secondary">Welcome back, Professor</p>
                </div>
                <div id="toggle-slot"></div>
        </header>

        <main class="main-content">
            <div class="container">

                <section class="mb-x1">
                    <div class="card">
                        <div class="card-body">
                            <input type="text" class="search-input" placeholder="Search Course By ID" style ="width: 100%; padding: var(--space-sm) var(--space-md); border:1px solid var(--neutral-300); border-radius: var(--radius-md); font-family: inherit; font-size: 1rem;">
                        </div>
                    </div>
                </section>

                <section class = "mb-xl">
                    <h2 class ="mb-md">Student Statistics</h2>
                    <div class = "grid grid-3">
                        <div class="card text-center">
                            <div class="stat-number text-primary">83.4%</div>
                            <div class="stat-label">Average Assignment Completion</div>
                            <p class="text-secondary mt-sm">Across all active courses</p>
                        </div>
                    <div class = "card text-center">
                        <div class="stat-number text-success">15</div>
                        <div class="stat-label">Active courses</div>
                        <p class="text-secondary mt-sm">Currently enabled for students</p>
                        </div>
                    <div class="card text-center">
                        <div class="stat-number text-warning">35%</div>
                        <div class="stat-label">Average midterm weight</div>
                        <p class="text-secondary mt-sm">Across all active courses</p>
                        </div>
                        </div>
                </section>  
                
                <section>
    <div class="flex-between" style="align-items: center; margin-bottom: var(--space-md);">
        <h2 style ="margin: 0;">Course Management</h2>
        <a href ="courseCreate.html">
            <button class="btn btn-primary">+ Create New Courses</button>
        </a>
    </div>
    
    <div class="assessment-list" id="courses-container">
        <p class="text-secondary text-center">Loading courses...</p>
    </div>
</section>
<div id="assessmentModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center;">
        <div class="card" style="width: 500px; max-width: 90%; background: white; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.2);">
            <div class="card-header flex-between" style="border-bottom: 1px solid var(--neutral-200); padding-bottom: 15px; margin-bottom: 15px;">
                <h3 id="modalCourseTitle" style="margin: 0;">Edit Assessments</h3>
                <button id="closeModalBtn" style="background: none; border: none; font-size: 1.2rem; cursor: pointer;">✖</button>
            </div>
            
            <input type="hidden" id="modalCourseId"> <div class="card-body" id="modalAssessmentList" style="max-height: 400px; overflow-y: auto;">
            </div>
            
            <div class="card-body" style="border-top: 1px solid var(--neutral-200); padding-top: 15px; margin-top: 15px;">
                <button id="addRowBtn" class="btn btn-tertiary" style="border: 1px dashed var(--primary-color); color: var(--primary-color); width: 100%; margin-bottom: 15px;">+ Add New Category</button>
                <div class="flex-between">
                    <button id="cancelModalBtn" class="btn btn-secondary">Cancel</button>
                    <button id="saveAssessmentsBtn" class="btn btn-primary">Save Changes to Database</button>
                </div>
            </div>
        </div>
    </div>
                <script src="adminPage.js"></script>
                <script src="../components/ToggleTheme/toggle-theme.js"></script>
    </body>
    </html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Courses</title>
    
    <!-- Global Styles -->
    <link rel="stylesheet" href="../css/style.css">
    
    <!-- Theme Toggle Styles -->
    <link rel="stylesheet" href="../components/ToggleTheme/toggleStyle.css">
</head>
<body>

    <!-- Header -->
    <header class="dashboard-header">
        <div class="container flex-between" style="align-items: center;">
            <div>
                <h1>Browse Courses</h1>
                <p class="text-secondary">Discover and add courses to your schedule</p>
            </div>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <!-- Back to Dashboard Link -->
                <a href="studentDashboard.html" class="btn btn-secondary btn-back">Back to Dashboard</a>
                
                <div id="toggle-slot"></div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">

            <!-- Search Bar -->
            <section class="mb-xl">
                <div class="card">
                    <div class="card-body">
                        <input type="text" class="search-input" placeholder="Search courses by name or code.">
                    </div>
                </div>
            </section>
            
            <!-- Enrolled Courses — populated by courseBrowse.js -->
            <section class="mb-xl">
                <h2 class="mb-lg">My Enrolled Courses</h2>
                <div class="grid grid-3 enrolled-courses-grid"></div>
            </section>

            <!-- Available Courses — populated by courseBrowse.js -->
            <section>
                <h2 class="mb-lg">Available Courses</h2>
                <div class="grid grid-3 course-grid"></div>
            </section>
             
        </div>
    </main>

    <!-- Theme Toggle Script -->
    <script src="../components/ToggleTheme/toggle-theme.js"></script>

    <!-- Auth scripts -->
    <script src="auth.js"></script>
    <script src="courseBrowse.js"></script>

</body>
</html>

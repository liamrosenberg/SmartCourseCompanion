<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name ="viewport" content="width=device-width, initial-scale=1.0">
        <title>Student Dashboard</title>
        <link rel="stylesheet" href="studentPage.css">

    </head>

    <body>
        <header class="dashboard-header">
            <div class="container">
        <h1>Dashboard</h1>
        <p class="text-secondary">Welcome back, Raymond</p>
        </div>
        </header>

        <main class="main-content">
            <div class="container">
                
                <section>
                    <div class="grid grid-3">

                        <!-- Card 1 -->
                         <div class="card">
                            <div class="card-body text-center">
                                <div class="stat-number text-primary">5</div>
                                <div class="stat-label">Active Courses</div>
                            </div>
                         </div>

                         <!-- Card 2 -->

                          <div class="card">
                            <div class="card-body text-center">
                                <div class="stat-number text-success">85.4%</div>
                                <div class="stat-label">Overall Average</div>
                            </div>
                         </div>

                         <!-- Card 3 -->

                          <div class="card">
                            <div class="card-body text-center">
                                <div class="stat-number text-warning">7</div>
                                <div class="stat-label">Pending Assessments</div>
                            </div>
                         </div>

                    </div>
                </section>
                 
            </div>

        </main>

    </body>
</html>
